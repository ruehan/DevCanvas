		<script>
			let metrics = {};
			const observer = new PerformanceObserver((list) => {
				const entries = list.getEntries();

				entries.forEach((entry) => {
					// 根据不同的entry类型处理不同的性能指标
					switch (entry.entryType) {
						case "navigation":
							{
								const navEntry = entry;
								metrics = {
									...metrics,
									dns: navEntry.domainLookupEnd - navEntry.domainLookupStart,
									response: navEntry.responseEnd - navEntry.responseStart,
									dom_parse: navEntry.domInteractive - navEntry.responseEnd,
									dom_ready: navEntry.domContentLoadedEventEnd - navEntry.fetchStart,
									resource: navEntry.domComplete - navEntry.domContentLoadedEventEnd,
									first_interactive: navEntry.domInteractive - navEntry.fetchStart,
									first_byte: navEntry.responseStart - navEntry.domainLookupStart,
									loaded: navEntry.loadEventEnd - navEntry.fetchStart,
								};
								sessionStorage.setItem("performance", JSON.stringify(metrics));
								// 发送性能指标到阿里云日志服务
							}
							break;

						case "paint":
							if (entry.name === "first-paint") {
								metrics = {
									...metrics,
									first_paint: entry.startTime,
								};
								sessionStorage.setItem("performance", JSON.stringify(metrics));
							}
							if (entry.name === "first-contentful-paint") {
								metrics = {
									...metrics,
									first_contentful_paint: entry.startTime,
								};
								sessionStorage.setItem("performance", JSON.stringify(metrics));
							}
							break;
					}
				});
			});

			// 观察的性能指标类型
			observer.observe({
				entryTypes: ["navigation", "paint"],
			});
		</script>

&lt;script&gt;
function switchView(view) {
  document.querySelectorAll(&apos;#view-landing, #view-studio&apos;).forEach(el =&gt; el.classList.add(&apos;hidden&apos;));
  const target = document.getElementById(&apos;view-&apos; + view);
  if (target) {
    target.classList.remove(&apos;hidden&apos;);
    target.classList.remove(&apos;view&apos;);
    void target.offsetWidth;
    target.classList.add(&apos;view&apos;);
  }
  document.querySelectorAll(&apos;.nav-btn&apos;).forEach(b =&gt; {
    const selected = b.dataset.view === view;
    b.setAttribute(&apos;aria-selected&apos;, selected);
    b.classList.toggle(&apos;text-text&apos;, selected);
    b.classList.toggle(&apos;bg-surface-alt&apos;, selected);
    b.classList.toggle(&apos;text-text-muted&apos;, !selected);
  });
  
  document.body.classList.toggle(&apos;studio-active&apos;, view === &apos;studio&apos;);
  
  window.scrollTo(0, 0);
  if (view === &apos;studio&apos;) setStudioState(&apos;empty&apos;);
}

document.querySelectorAll(&apos;[data-view]&apos;).forEach(el =&gt; {
  el.addEventListener(&apos;click&apos;, e =&gt; { e.preventDefault(); switchView(el.dataset.view); });
});

function setStudioState(state) {
  [&apos;empty&apos;, &apos;loading&apos;, &apos;result&apos;].forEach(s =&gt; {
    document.getElementById(&apos;conv-&apos; + s).classList.toggle(&apos;hidden&apos;, s !== state);
  });
  document.getElementById(&apos;canvas-empty&apos;).classList.toggle(&apos;hidden&apos;, state !== &apos;empty&apos;);
  document.getElementById(&apos;canvas-loading&apos;).classList.toggle(&apos;hidden&apos;, state !== &apos;loading&apos;);
  document.getElementById(&apos;canvas-result&apos;).classList.toggle(&apos;hidden&apos;, state !== &apos;result&apos;);

  document.querySelectorAll(&apos;.state-btn&apos;).forEach(b =&gt; {
    const active = b.dataset.studioState === state;
    b.classList.toggle(&apos;bg-text&apos;, active);
    b.classList.toggle(&apos;text-bg&apos;, active);
    b.classList.toggle(&apos;text-text-muted&apos;, !active);
  });

  if (state === &apos;result&apos;) {
    const thread = document.getElementById(&apos;convThread&apos;);
    setTimeout(() =&gt; { if (thread) thread.scrollTop = thread.scrollHeight; }, 50);
  }
}
document.querySelectorAll(&apos;.state-btn&apos;).forEach(b =&gt; b.addEventListener(&apos;click&apos;, () =&gt; setStudioState(b.dataset.studioState)));

function triggerGenerate() {
  setStudioState(&apos;loading&apos;);
  clearTimeout(window._genTimer);
  window._genTimer = setTimeout(() =&gt; setStudioState(&apos;result&apos;), 4200);
}
document.querySelectorAll(&apos;.prompt-chip&apos;).forEach(chip =&gt; {
  chip.addEventListener(&apos;click&apos;, () =&gt; {
    const input = document.getElementById(&apos;promptInput-empty&apos;);
    if (input) input.value = chip.querySelector(&apos;span&apos;).textContent;
    triggerGenerate();
  });
});
document.getElementById(&apos;sendBtn-empty&apos;)?.addEventListener(&apos;click&apos;, triggerGenerate);
document.getElementById(&apos;promptInput-empty&apos;)?.addEventListener(&apos;keydown&apos;, e =&gt; {
  if (e.key === &apos;Enter&apos; &amp;&amp; !e.shiftKey) { e.preventDefault(); triggerGenerate(); }
});

function switchTab(tab) {
  document.querySelectorAll(&apos;.tab-panel&apos;).forEach(p =&gt; p.classList.add(&apos;hidden&apos;));
  const target = document.getElementById(&apos;tab-&apos; + tab);
  if (target) target.classList.remove(&apos;hidden&apos;);
  document.querySelectorAll(&apos;.tab-btn&apos;).forEach(b =&gt; b.setAttribute(&apos;aria-selected&apos;, b.dataset.tab === tab));
  const tb = document.getElementById(&apos;previewToolbar&apos;);
  if (tb) tb.style.display = tab === &apos;preview&apos; ? &apos;flex&apos; : &apos;none&apos;;
}
document.querySelectorAll(&apos;.tab-btn&apos;).forEach(b =&gt; b.addEventListener(&apos;click&apos;, () =&gt; switchTab(b.dataset.tab)));

function setPreviewState(mode) {
  document.querySelectorAll(&apos;.preview-state&apos;).forEach(el =&gt; el.classList.add(&apos;hidden&apos;));
  document.getElementById(&apos;preview-&apos; + mode)?.classList.remove(&apos;hidden&apos;);
  document.querySelectorAll(&apos;.state-mode-btn&apos;).forEach(b =&gt; {
    const active = b.dataset.stateMode === mode;
    b.classList.toggle(&apos;bg-text&apos;, active);
    b.classList.toggle(&apos;text-bg&apos;, active);
    b.classList.toggle(&apos;text-text-muted&apos;, !active);
  });
}
document.querySelectorAll(&apos;.state-mode-btn&apos;).forEach(b =&gt; b.addEventListener(&apos;click&apos;, () =&gt; setPreviewState(b.dataset.stateMode)));

function showToast(msg) {
  const toast = document.getElementById(&apos;toast&apos;);
  document.getElementById(&apos;toastMsg&apos;).textContent = msg;
  toast.classList.remove(&apos;hidden&apos;);
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() =&gt; toast.classList.add(&apos;hidden&apos;), 2000);
}
document.getElementById(&apos;copyCodeBtn&apos;)?.addEventListener(&apos;click&apos;, e =&gt; {
  const label = e.currentTarget.querySelector(&apos;.copy-label&apos;);
  if (label) { label.textContent = &apos;복사됨&apos;; setTimeout(() =&gt; label.textContent = &apos;복사&apos;, 1500); }
  showToast(&apos;코드가 복사되었습니다.&apos;);
});

			var token = localStorage.getItem("token");
			var base = window.WEBUI_BASE_URL || "";
			var lang = localStorage.locale ?? (navigator.language.includes("zh") ? "zh-CN" : "en-US");
			var config = {
				credentials: "include",
				headers: {
					Accept: "application/json",
					"Content-Type": "application/json",
					...(token ? { Authorization: `Bearer ${token}` } : {}),
					"Accept-Language": lang,
				},
			};

			var sessionFetch = fetch(`${base}/api/v1/auths/`, config).then(async (res) => {
				if (!res.ok) throw await res.json();
				return res.json();
			});

			window.GLOBAL_FETCHES = {
				session: sessionFetch,
				config: fetch(`${base}/api/config`, config).then(async (res) => {
					if (!res.ok) throw await res.json();
					return res.json();
				}),
				// token 存在时与其他请求并行；不存在时需等 session 之后再请求 models
				// 至少要 cookie 里有 token 才能正常请求 models
				models: token ? fetch(`${base}/api/models`, config) : sessionFetch.then(() => fetch(`${base}/api/models`, config)),
				settings:
					token &&
					fetch(`${base}/api/v1/users/user/settings`, config).then(async (res) => {
						if (!res.ok) throw await res.json();
